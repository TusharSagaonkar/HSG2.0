{% load i18n %}
<div class="modal fade" id="voucherDetailModal" tabindex="-1" aria-labelledby="voucherDetailModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="voucherDetailModalLabel" data-voucher-detail-title>{% translate "Voucher Details" %}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" data-voucher-detail-body>
        <p class="text-muted mb-0">{% translate "Select a voucher number to view details." %}</p>
      </div>
    </div>
  </div>
</div>
