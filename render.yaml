# Render deploy configuration for housing_accounting
# https://render.com/docs/deploy#render-yaml

services:
  - type: web
    name: housing-accounting
    env: python
    plan: free
    # Build steps (RUN once per deploy)
    buildCommand: pip install -r requirement.txt
    # Start command (RUN on each instance restart)
    startCommand: python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      # Django configuration
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        # Replace with your Render service hostname (or use '*' for testing)
        value: "housing-accounting.onrender.com"
      - key: DJANGO_ADMIN_URL
        value: "admin/"
      - key: DJANGO_DEFAULT_FROM_EMAIL
        value: "noreply@localhost"
      # The secret key should come from Render Secrets (do NOT commit it).
      - key: DJANGO_SECRET_KEY
        fromSecret: DJANGO_SECRET_KEY

    # Optional: set the instance type / autoscaling settings.
    # Instances:
    #   type: "standard-1x"

# Note: Render will provide DATABASE_URL and REDIS_URL automatically if you add
# a Postgres/Redis addon from the Render dashboard.
